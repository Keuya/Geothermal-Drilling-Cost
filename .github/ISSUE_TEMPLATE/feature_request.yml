name: Feature request
description: Suggest an improvement or new analysis capability
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your suggested approach.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Why this would improve the project.
